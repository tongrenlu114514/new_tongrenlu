<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全屏播放器 - 东方同人录</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        /* 几何未来主义全屏播放器 */
        :root {
            --geo-bg: #ffffff;
            --geo-bg-alt: #f8f9fa;
            --geo-primary: #1a1a2e;
            --geo-accent: #e94560;
            --geo-accent-alt: #0f3460;
            --geo-text: #1a1a2e;
            --geo-text-light: #4a4a5a;
            --geo-text-muted: #8a8a9a;
            --geo-border: #e0e0e5;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--geo-primary);
            color: var(--geo-text);
            overflow: hidden;
            height: 100vh;
        }
        
        /* 主容器 */
        .player-container {
            display: flex;
            height: 100vh;
            position: relative;
        }
        
        /* 几何背景 */
        .player-container::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, transparent 49%, rgba(233, 69, 96, 0.1) 49%, rgba(233, 69, 96, 0.1) 51%, transparent 51%),
                linear-gradient(45deg, transparent 49%, rgba(255, 255, 255, 0.05) 49%, rgba(255, 255, 255, 0.05) 51%, transparent 51%);
            background-size: 80px 80px, 80px 80px;
            pointer-events: none;
            z-index: 0;
        }
        
        /* 专辑区域 */
        .album-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            position: relative;
            z-index: 1;
        }
        
        .album-content {
            text-align: center;
            max-width: 500px;
        }
        
        .album-cover {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 2rem;
            background: var(--geo-accent);
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            overflow: hidden;
            box-shadow: 20px 20px 0 rgba(0,0,0,0.3);
        }
        
        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .album-cover .fallback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            color: white;
            opacity: 0.5;
        }
        
        .floating-notes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .floating-notes .note {
            position: absolute;
            color: white;
            opacity: 0.3;
            font-size: 1.5rem;
            animation: float-note 3s ease-in-out infinite;
        }
        
        .floating-notes .note:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
        .floating-notes .note:nth-child(2) { top: 60%; right: 15%; animation-delay: 1s; }
        .floating-notes .note:nth-child(3) { bottom: 20%; left: 20%; animation-delay: 2s; }
        
        @keyframes float-note {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(15deg); }
        }
        
        .album-info {
            color: white;
        }
        
        .album-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
        }
        
        .album-artist {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
        }
        
        /* 播放器控制栏 */
        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            border-top: 3px solid var(--geo-accent);
        }
        
        .left-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .control-btn {
            width: 44px;
            height: 44px;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }
        
        .control-btn:hover {
            border-color: var(--geo-accent);
            color: var(--geo-accent);
        }
        
        .control-btn.play-btn {
            width: 56px;
            height: 56px;
            background: var(--geo-accent);
            border-color: var(--geo-accent);
            font-size: 1.2rem;
        }
        
        .control-btn.play-btn:hover {
            background: white;
            color: var(--geo-accent);
        }
        
        .center-controls {
            flex: 1;
        }
        
        .progress-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .time-display {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            min-width: 45px;
        }
        
        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            position: relative;
        }
        
        .progress-bar .progress {
            height: 100%;
            background: var(--geo-accent);
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .right-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .volume-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .volume-container i {
            color: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        
        .volume-slider {
            width: 100px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            position: relative;
        }
        
        .volume-slider .volume-level {
            height: 100%;
            background: var(--geo-accent);
            width: 70%;
        }
        
        /* 播放列表区域 */
        .playlist-section {
            width: 380px;
            background: var(--geo-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            border-left: 3px solid var(--geo-primary);
        }
        
        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            background: var(--geo-primary);
            color: white;
        }
        
        .playlist-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
        }
        
        .playlist-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .action-btn {
            width: 36px;
            height: 36px;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            border-color: var(--geo-accent);
            color: var(--geo-accent);
        }
        
        .action-btn.active {
            border-color: var(--geo-accent);
            color: var(--geo-accent);
        }
        
        .playlist-container {
            flex: 1;
            overflow-y: auto;
        }
        
        .playlist {
            list-style: none;
        }
        
        .playlist li {
            display: flex;
            align-items: center;
            padding: 0.8rem 1.5rem;
            border-bottom: 2px solid var(--geo-border);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .playlist li:hover {
            background: var(--geo-bg-alt);
        }
        
        .playlist li.active {
            background: var(--geo-accent);
            color: white;
        }
        
        .playlist li .track-num {
            width: 30px;
            font-family: 'Bebas Neue', sans-serif;
            color: var(--geo-text-muted);
        }
        
        .playlist li.active .track-num {
            color: rgba(255,255,255,0.6);
        }
        
        .playlist li .track-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        
        .playlist li .track-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
        }
        
        .playlist li .track-subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            color: var(--geo-text-muted);
        }
        
        .playlist li.active .track-subtitle {
            color: rgba(255,255,255,0.5);
        }
        
        .playlist li .track-duration {
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            color: var(--geo-text-muted);
        }
        
        .playlist li.active .track-duration {
            color: rgba(255,255,255,0.6);
        }
        
        /* 歌词容器 */
        .lyrics-container {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            background: var(--geo-bg-alt);
        }
        
        .lyrics-container.active {
            display: block;
        }
        
        .lyrics {
            text-align: center;
        }
        
        .lyric-line {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            color: var(--geo-text-muted);
            padding: 0.5rem 0;
            transition: all 0.3s ease;
        }
        
        .lyric-line.active {
            font-size: 1.2rem;
            color: var(--geo-accent);
            font-weight: 500;
        }
        
        .lyric-line.no-lyrics {
            color: var(--geo-text-muted);
            font-style: italic;
            margin-top: 3rem;
        }
        
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            width: 50px;
            height: 50px;
            background: var(--geo-accent);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: all 0.3s ease;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        
        .back-btn:hover {
            background: white;
            color: var(--geo-accent);
        }
        
        /* 播放覆盖层 */
        .play-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        .play-overlay.hidden {
            display: none;
        }
        
        .overlay-content {
            text-align: center;
            color: white;
        }
        
        .play-overlay-icon {
            font-size: 5rem;
            color: var(--geo-accent);
            margin-bottom: 1.5rem;
        }
        
        .overlay-content h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
        }
        
        .overlay-content p {
            font-family: 'Space Grotesk', sans-serif;
            color: rgba(255,255,255,0.6);
            margin-bottom: 2rem;
        }
        
        .play-overlay-btn {
            font-family: 'Space Grotesk', sans-serif;
            padding: 1rem 2.5rem;
            font-size: 0.9rem;
            background: var(--geo-accent);
            border: none;
            color: white;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
        }
        
        .play-overlay-btn:hover {
            background: white;
            color: var(--geo-accent);
        }
        
        /* 响应式 */
        @media (max-width: 900px) {
            .playlist-section {
                display: none;
            }
            
            .album-cover {
                width: 250px;
                height: 250px;
            }
            
            .album-title {
                font-size: 2rem;
            }
            
            .player-controls {
                flex-wrap: wrap;
                gap: 1rem;
                padding: 1rem;
            }
            
            .right-controls {
                width: 100%;
                justify-content: center;
            }
        }
        
        @media (max-width: 600px) {
            .album-section {
                padding: 1rem;
            }
            
            .album-cover {
                width: 200px;
                height: 200px;
            }
            
            .album-title {
                font-size: 1.5rem;
            }
            
            .control-btn.play-btn {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>
<div class="player-container">
    <!-- 专辑图片区域 -->
    <div class="album-section">
        <div class="album-content">
            <div class="album-cover">
                <img alt="专辑图片" id="albumImage" src=""/>
                <div class="fallback"><i class="fas fa-music"></i></div>
                <div class="floating-notes">
                    <i class="fas fa-music note"></i>
                    <i class="fas fa-music note"></i>
                    <i class="fas fa-music note"></i>
                </div>
            </div>
            <div class="album-info">
                <h1 class="album-title" id="albumTitle">正在加载...</h1>
                <p class="album-artist" id="albumArtist">未知艺术家</p>
            </div>
        </div>

        <!-- 播放器控制栏 -->
        <div class="player-controls">
            <div class="left-controls">
                <button class="control-btn" id="prevBtn">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="control-btn play-btn" id="playBtn">
                    <i class="fas fa-play"></i>
                </button>
                <button class="control-btn" id="nextBtn">
                    <i class="fas fa-step-forward"></i>
                </button>
            </div>

            <div class="center-controls">
                <div class="progress-container">
                    <span class="time-display" id="currentTime">0:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress" id="progress"></div>
                    </div>
                    <span class="time-display" id="totalTime">0:00</span>
                </div>
            </div>

            <div class="right-controls">
                <div class="volume-container">
                    <i class="fas fa-volume-up" id="volumeIcon"></i>
                    <div class="volume-slider" id="volumeSlider">
                        <div class="volume-level" id="volumeLevel"></div>
                    </div>
                </div>
                <button class="control-btn" id="fullscreenBtn">
                    <i class="fas fa-compress"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 播放列表区域 -->
    <div class="playlist-section">
        <div class="playlist-header">
            <h2>播放列表</h2>
            <div class="playlist-actions">
                <button class="action-btn" id="lyricBtn">
                    <i class="fas fa-align-left"></i>
                </button>
                <button class="action-btn" id="shuffleBtn">
                    <i class="fas fa-random"></i>
                </button>
                <button class="action-btn" id="repeatBtn">
                    <i class="fas fa-redo"></i>
                </button>
            </div>
        </div>

        <div class="playlist-container" id="playlistContainer">
            <ul class="playlist" id="playlist">
            </ul>
        </div>

        <!-- 歌词显示区域 -->
        <div class="lyrics-container" id="lyricsContainer">
            <div class="lyrics" id="lyrics">
                <div class="lyric-line no-lyrics">暂无歌词</div>
            </div>
        </div>
    </div>
</div>

<!-- 返回按钮 -->
<button class="back-btn" id="backBtn">
    <i class="fas fa-arrow-left"></i>
</button>

<audio id="audioPlayer" style="display: none;"></audio>

<!-- 播放覆盖层 -->
<div class="play-overlay" id="playOverlay">
    <div class="overlay-content">
        <i class="fas fa-play-circle play-overlay-icon"></i>
        <h2>点击播放您的音乐</h2>
        <p>请与页面交互以开始播放</p>
        <button class="play-overlay-btn" id="overlayPlayBtn">开始播放</button>
    </div>
</div>

<script src="webjars/jquery/jquery.min.js"></script>
<!-- 工具函数 -->
<script src="components/player/player-utils.js"></script>
<!-- 数据加载 -->
<script src="components/player/player-data.js"></script>
<!-- 初始化变量 -->
<script src="components/player/player-fullscreen-init.js"></script>
<!-- 基础UI控制 -->
<script src="components/player/player-base-ui.js"></script>
<!-- UI控制 -->
<script src="components/player/player-ui.js"></script>
<!-- 歌词模块 -->
<script src="components/player/player-lyrics.js"></script>
<!-- 播放控制 -->
<script src="components/player/player-controls.js"></script>
<!-- 导航控制 -->
<script src="components/player/player-navigation.js"></script>
<!-- 事件处理 -->
<script src="components/player/player-events.js"></script>
<script src="components/player/player-fullscreen-events.js"></script>
<!-- 主逻辑 -->
<script src="components/player/player-fullscreen.js"></script>
</body>
</html>
