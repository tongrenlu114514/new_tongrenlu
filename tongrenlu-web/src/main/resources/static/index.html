<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东方Project同人音乐网站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="webjars/font-awesome/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/home-redesign.css" rel="stylesheet">
</head>
<body>
    <!-- 星空粒子背景 -->
    <div id="particles-js"></div>
    
    <!-- 导航栏 -->
    <nav>
        <a href="index.html" class="logo">东方同人录</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link active" data-page="home">首页</a>
            <a href="album.html" class="nav-link" data-page="music">音乐库</a>
            <a href="artist-showcase.html" class="nav-link" data-page="artist">艺术家</a>
            <a href="event.html" class="nav-link" data-page="event">展会</a>
            <a href="#">关于我们</a>
        </div>
        <div class="nav-stats">
            <span class="nav-stats__number" id="navAlbumCount">--</span>
            <span class="nav-stats__label">张专辑</span>
        </div>
    </nav>
    
    <!-- 首页内容 -->
    <div class="home-content" id="homePage">
        <!-- 图片画廊 Hero 区域 -->
        <section class="home-hero-gallery">
            <div class="home-gallery-grid" id="galleryGrid">
                <!-- 动态加载专辑封面 -->
            </div>
        </section>

        <!-- 最新专辑轮播区域 -->
        <section class="home-section">
            <h2 class="home-section__title">最新专辑</h2>
            <div class="home-carousel" id="latestAlbumsCarousel">
                <button class="home-carousel__btn home-carousel__btn--prev">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="home-carousel__wrapper">
                    <div class="home-carousel__track" id="latestAlbumsTrack">
                        <!-- 动态加载 -->
                        <div class="home-loading">
                            <div class="home-loading__spinner"></div>
                        </div>
                    </div>
                </div>
                <button class="home-carousel__btn home-carousel__btn--next">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </section>
    </div>
    
    <!-- 页脚 -->
    <footer class="home-footer">
        <p>&copy; 2025 东方同人录. 本站所有内容版权归原作者所有.</p>
        <p>本网站仅为学习交流使用，不涉及任何商业用途</p>
    </footer>
    
    <!-- 底部音乐播放器 -->
    <div class="player">
        <div class="now-playing">
            <div class="now-playing-cover">🎵</div>
            <div class="now-playing-info">
                <div class="now-playing-title">梦月仙境</div>
                <div class="now-playing-artist">上海爱丽丝幻乐团</div>
            </div>
        </div>
        
        <div class="player-controls">
            <div class="control-buttons">
                <button class="control-btn"><i class="fas fa-random"></i></button>
                <button class="control-btn"><i class="fas fa-step-backward"></i></button>
                <button class="control-btn play-pause"><i class="fas fa-play"></i></button>
                <button class="control-btn"><i class="fas fa-step-forward"></i></button>
                <button class="control-btn"><i class="fas fa-redo"></i></button>
            </div>
            
            <div class="progress-container">
                <span class="progress-time">1:20</span>
                <div class="progress-bar">
                    <div class="progress"></div>
                </div>
                <span class="progress-time">4:45</span>
            </div>
        </div>
        
        <div class="volume-controls">
            <i class="fas fa-volume-up volume-icon"></i>
            <div class="volume-slider">
                <div class="volume-level"></div>
            </div>
        </div>
    </div>
    
    <!-- 隐藏的音频播放器 -->
    <audio id="audioPlayer" style="display: none;"></audio>
    
    <!-- 版本号显示 -->
    <div id="version-info" style="position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; z-index: 1002;">
        版本: v1.2.1
    </div>

    <!-- 外部JavaScript文件 -->
    <script src="webjars/jquery/jquery.min.js"></script>
    <script src="components/shared/image-loader.js"></script>
    <script src="components/home/gallery-hero.js"></script>
    <script src="components/home/home.js"></script>
    <script src="components/home/stats.js"></script>
    <script src="components/home/latest-albums.js"></script>
    <script src="components/home/popular-albums.js"></script>
    <script src="components/home/artist-recommendation.js"></script>
    <script src="components/player/player-base-core.js"></script>
    <script src="components/player/player-base-ui.js"></script>
    <script src="components/player/player-events.js"></script>
    <script src="components/home/particles.js"></script>
</body>
</html>
