<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未发布专辑管理 - 东方同人录</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="assets/css/geometric-theme.css" rel="stylesheet">
    
    <style>
        /* 后台管理特定样式 */
        .geo-admin-page {
            padding-top: 80px;
            min-height: 100vh;
            background: var(--geo-bg-alt);
        }
        
        .geo-admin-header {
            background: var(--geo-primary);
            padding: 1.5rem 2rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--geo-accent);
        }
        
        .geo-admin-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            color: white;
            letter-spacing: 2px;
        }
        
        .geo-admin-nav {
            display: flex;
            gap: 0.5rem;
        }
        
        .geo-admin-nav__link {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            padding: 0.6rem 1.2rem;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .geo-admin-nav__link:hover {
            border-color: var(--geo-accent);
            color: var(--geo-accent);
        }
        
        .geo-admin-nav__link.active {
            background: var(--geo-accent);
            border-color: var(--geo-accent);
            color: white;
        }
        
        .geo-admin-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        /* 统计卡片 */
        .geo-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .geo-stat {
            background: var(--geo-primary);
            padding: 1.5rem 2rem;
            position: relative;
            overflow: hidden;
        }
        
        .geo-stat::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 60px;
            height: 60px;
            background: var(--geo-accent);
            opacity: 0.2;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }
        
        .geo-stat__label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        
        .geo-stat__value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: white;
            letter-spacing: 2px;
        }
        
        /* 卡片 */
        .geo-admin-card {
            background: var(--geo-bg);
            border: 2px solid var(--geo-border);
            margin-bottom: 2rem;
        }
        
        .geo-admin-card__header {
            padding: 1.5rem 2rem;
            background: var(--geo-bg-alt);
            border-bottom: 2px solid var(--geo-border);
        }
        
        .geo-admin-card__title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            color: var(--geo-primary);
            letter-spacing: 2px;
        }
        
        /* 表格 */
        .geo-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .geo-table th {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--geo-text-muted);
            text-align: left;
            padding: 1rem 1.5rem;
            background: var(--geo-bg-alt);
            border-bottom: 2px solid var(--geo-border);
        }
        
        .geo-table td {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            color: var(--geo-text);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--geo-border);
        }
        
        .geo-table tr:hover td {
            background: var(--geo-bg-alt);
        }
        
        .geo-table__id {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            color: var(--geo-text-muted);
        }
        
        .geo-table__title {
            font-weight: 500;
            color: var(--geo-primary);
        }
        
        .geo-table__status {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--geo-accent);
            color: white;
        }
        
        .geo-table__btn {
            font-family: 'Space Grotesk', sans-serif;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            border: 2px solid var(--geo-border);
            background: var(--geo-bg);
            color: var(--geo-text-light);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-right: 0.5rem;
        }
        
        .geo-table__btn:hover {
            border-color: var(--geo-accent);
            color: var(--geo-accent);
        }
        
        .geo-table__btn--publish {
            background: var(--geo-accent);
            border-color: var(--geo-accent);
            color: white;
        }
        
        .geo-table__btn--publish:hover {
            background: var(--geo-primary);
            border-color: var(--geo-primary);
        }
        
        .geo-admin-pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1.5rem;
        }
        
        /* 模态框 */
        .geo-admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 46, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        .geo-admin-modal.active {
            display: flex;
        }
        
        .geo-admin-modal__content {
            background: var(--geo-bg);
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 3px solid var(--geo-primary);
        }
        
        .geo-admin-modal__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background: var(--geo-primary);
            color: white;
        }
        
        .geo-admin-modal__title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
        }
        
        .geo-admin-modal__close {
            width: 36px;
            height: 36px;
            background: var(--geo-accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .geo-admin-modal__close:hover {
            background: white;
            color: var(--geo-accent);
        }
        
        .geo-admin-modal__body {
            padding: 2rem;
        }
        
        .geo-admin-modal__info {
            margin-bottom: 1.5rem;
        }
        
        .geo-admin-modal__info p {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            color: var(--geo-text-light);
            margin-bottom: 0.5rem;
        }
        
        .geo-admin-modal__info strong {
            color: var(--geo-primary);
        }
        
        .geo-admin-modal__search {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .geo-admin-modal__input {
            flex: 1;
            padding: 0.8rem 1rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            border: 2px solid var(--geo-border);
            background: var(--geo-bg);
            color: var(--geo-text);
        }
        
        .geo-admin-modal__input:focus {
            outline: none;
            border-color: var(--geo-accent);
        }
        
        .geo-admin-modal__results {
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid var(--geo-border);
        }
        
        .geo-admin-modal__result {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid var(--geo-border);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .geo-admin-modal__result:hover {
            background: var(--geo-bg-alt);
        }
        
        .geo-admin-modal__result-cover {
            width: 50px;
            height: 50px;
            background: var(--geo-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .geo-admin-modal__result-info {
            flex: 1;
        }
        
        .geo-admin-modal__result-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            color: var(--geo-primary);
            margin-bottom: 0.2rem;
        }
        
        .geo-admin-modal__result-artist {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            color: var(--geo-text-muted);
        }
        
        @media (max-width: 900px) {
            .geo-admin-header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            
            .geo-table {
                display: block;
                overflow-x: auto;
            }
            
            .geo-table th,
            .geo-table td {
                padding: 0.75rem 1rem;
                white-space: nowrap;
            }
        }
        
        @media (max-width: 600px) {
            .geo-admin-content {
                padding: 1rem;
            }
            
            .geo-admin-modal__content {
                max-width: 100%;
                margin: 1rem;
            }
        }
    </style>
</head>
<body class="geo-theme">
    <!-- 导航栏 -->
    <header class="geo-admin-header">
        <h1 class="geo-admin-title">管理后台 - 未发布专辑</h1>
        <nav class="geo-admin-nav">
            <a href="unpublish.html" class="geo-admin-nav__link active">未发布专辑</a>
            <a href="artist.html" class="geo-admin-nav__link">艺人管理</a>
        </nav>
    </header>

    <!-- 主内容 -->
    <div class="geo-admin-page">
        <div class="geo-admin-content">
            <!-- 统计卡片 -->
            <div class="geo-stats">
                <div class="geo-stat">
                    <div class="geo-stat__label">未发布专辑数量</div>
                    <div class="geo-stat__value" id="unpublished-count">0</div>
                </div>
            </div>
            
            <!-- 专辑列表 -->
            <div class="geo-admin-card">
                <div class="geo-admin-card__header">
                    <h2 class="geo-admin-card__title">未发布专辑列表</h2>
                </div>
                <table class="geo-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>专辑名称</th>
                            <th>网易云ID</th>
                            <th>状态</th>
                            <th>发布日期</th>
                            <th>访问次数</th>
                            <th style="text-align: right;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="album-list">
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 2rem;">
                                <div class="geo-loading">
                                    <div class="geo-loading__spinner"></div>
                                    <div class="geo-loading__text">加载中...</div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="geo-admin-pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <!-- 搜索模态框 -->
    <div class="geo-admin-modal" id="searchModal">
        <div class="geo-admin-modal__content">
            <div class="geo-admin-modal__header">
                <h3 class="geo-admin-modal__title">搜索网易云专辑</h3>
                <button class="geo-admin-modal__close">&times;</button>
            </div>
            <div class="geo-admin-modal__body">
                <div class="geo-admin-modal__info">
                    <p>当前专辑: <strong id="searchAlbumTitle"></strong></p>
                    <p>艺术家: <strong id="searchAlbumArtist"></strong></p>
                    <p>发布日期: <strong id="searchAlbumPublishDate"></strong></p>
                </div>
                <div class="geo-admin-modal__search">
                    <input type="text" class="geo-admin-modal__input" id="searchKeyword" placeholder="输入搜索关键词">
                    <button class="geo-table__btn geo-table__btn--publish" id="searchBtn">搜索</button>
                </div>
                <div class="geo-admin-modal__results" id="searchResultsContainer"></div>
                <div class="geo-admin-pagination" id="search-pagination"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="components/admin/admin.js"></script>
</body>
</html>
