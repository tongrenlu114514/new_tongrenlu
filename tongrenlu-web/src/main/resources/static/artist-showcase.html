<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艺术家 - 东方同人录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="webjars/font-awesome/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/home-redesign.css" rel="stylesheet">
    <link href="components/artist-showcase/artist-showcase.css" rel="stylesheet">
</head>
<body>
    <!-- 星空粒子背景 -->
    <div id="particles-js"></div>
    
    <!-- 导航栏 -->
    <nav>
        <a href="index.html" class="logo">东方同人录</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link" data-page="home">首页</a>
            <a href="album.html" class="nav-link" data-page="music">音乐库</a>
            <a href="artist-showcase.html" class="nav-link active" data-page="artist">艺术家</a>
            <a href="#">关于我们</a>
        </div>
        <div class="nav-stats">
            <span class="nav-stats__number" id="navArtistCount">--</span>
            <span class="nav-stats__label">位艺术家</span>
        </div>
    </nav>
    
    <!-- 艺术家展示页面 -->
    <div class="artist-showcase-page">
        <!-- 搜索区域 -->
        <div class="artist-search-section">
            <h1 class="artist-page-title">艺术家</h1>
            <div class="artist-search-box">
                <i class="fas fa-search artist-search-icon"></i>
                <input type="text" class="artist-search-input" id="artistSearchInput" placeholder="搜索艺术家...">
                <button class="artist-search-clear" id="artistSearchClear" style="display: none;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        
        <!-- 艺术家卡片网格 -->
        <div class="artist-grid" id="artistGrid">
            <!-- 卡片将通过 JavaScript 动态生成 -->
        </div>
        
        <!-- 加载状态 -->
        <div class="artist-loading" id="artistLoading">
            <div class="artist-loading__spinner"></div>
            <p>正在加载艺术家...</p>
        </div>
        
        <!-- 空状态 -->
        <div class="artist-empty" id="artistEmpty" style="display: none;">
            <i class="fas fa-user-slash"></i>
            <p>未找到匹配的艺术家</p>
        </div>
    </div>
    
    <!-- 页脚 -->
    <footer class="home-footer">
        <p>&copy; 2025 东方同人录. 本站所有内容版权归原作者所有.</p>
        <p>本网站仅为学习交流使用，不涉及任何商业用途</p>
    </footer>

    <!-- 专辑列表弹窗 -->
    <div class="artist-modal" id="artistModal">
        <div class="artist-modal__content">
            <div class="artist-modal__header">
                <h2 class="artist-modal__title" id="artistModalTitle">艺术家专辑</h2>
                <button class="artist-modal__close" id="artistModalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="artist-modal__body" id="artistModalBody">
                <!-- 专辑列表将通过 JS 动态生成 -->
            </div>
            
            <!-- 分页控件 -->
            <div class="artist-modal__pagination" id="artistModalPagination">
                <!-- 分页按钮将通过 JavaScript 动态生成 -->
            </div>
        </div>
    </div>
    
    <!-- 底部音乐播放器 -->
    <div class="player">
        <div class="now-playing">
            <div class="now-playing-cover">🎵</div>
            <div class="now-playing-info">
                <div class="now-playing-title">梦月仙境</div>
                <div class="now-playing-artist">上海爱丽丝幻乐团</div>
            </div>
        </div>
        
        <div class="player-controls">
            <div class="control-buttons">
                <button class="control-btn"><i class="fas fa-random"></i></button>
                <button class="control-btn"><i class="fas fa-step-backward"></i></button>
                <button class="control-btn play-pause"><i class="fas fa-play"></i></button>
                <button class="control-btn"><i class="fas fa-step-forward"></i></button>
                <button class="control-btn"><i class="fas fa-redo"></i></button>
            </div>
            
            <div class="progress-container">
                <span class="progress-time">1:20</span>
                <div class="progress-bar">
                    <div class="progress"></div>
                </div>
                <span class="progress-time">4:45</span>
            </div>
        </div>
        
        <div class="volume-controls">
            <i class="fas fa-volume-up volume-icon"></i>
            <div class="volume-slider">
                <div class="volume-level"></div>
            </div>
        </div>
    </div>
    
    <!-- 隐藏的音频播放器 -->
    <audio id="audioPlayer" style="display: none;"></audio>
    
    <!-- 版本号显示 -->
    <div id="version-info" style="position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; z-index: 1002;">
        版本: v1.2.1
    </div>

    <!-- JavaScript -->
    <script src="webjars/jquery/jquery.min.js"></script>
    <script src="components/shared/image-loader.js"></script>
    <script src="components/player/player-base-core.js"></script>
    <script src="components/player/player-base-ui.js"></script>
    <script src="components/player/player-events.js"></script>
    <script src="components/home/particles.js"></script>
    <script src="components/artist-showcase/artist-showcase.js"></script>
</body>
</html>
