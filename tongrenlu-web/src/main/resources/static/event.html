<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展会 - 东方同人录</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="assets/css/geometric-theme.css" rel="stylesheet">
    
    <style>
        /* 展会页面特定样式 */
        .geo-event-page {
            padding-top: 80px;
            min-height: 100vh;
        }
        
        .geo-event-header {
            background: linear-gradient(135deg, var(--geo-accent-alt), var(--geo-primary));
            padding: 4rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .geo-event-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(135deg, transparent 49%, rgba(255, 255, 255, 0.1) 49%, rgba(255, 255, 255, 0.1) 51%, transparent 51%);
            background-size: 60px 60px;
            animation: geo-pattern-drift 30s linear infinite;
        }
        
        @keyframes geo-pattern-drift {
            0% { background-position: 0 0; }
            100% { background-position: 120px 120px; }
        }
        
        .geo-event-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            color: white;
            letter-spacing: 5px;
            position: relative;
            margin-bottom: 0.5rem;
        }
        
        .geo-event-subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            position: relative;
            margin-bottom: 2rem;
        }
        
        .geo-event-search {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }
        
        .geo-event-search__input {
            width: 100%;
            padding: 1rem 3rem 1rem 1.2rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            border: none;
            background: rgba(255,255,255,0.95);
            color: var(--geo-text);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }
        
        .geo-event-search__icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--geo-text-muted);
        }
        
        .geo-event-search__clear {
            position: absolute;
            right: 2.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--geo-text-muted);
            cursor: pointer;
            display: none;
        }
        
        .geo-event-search__clear.visible {
            display: block;
        }
        
        /* 筛选区域容器 */
        .geo-event-filter {
            background: var(--geo-bg-alt);
            padding: 1.5rem 2rem;
            border-bottom: 3px solid var(--geo-border);
        }
        
        .geo-event-filter__inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .geo-event-sort {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .geo-event-sort__label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            color: var(--geo-text-muted);
        }
        
        /* 筛选区域 - 兼容JS类名 */
        .geo-event-tabs,
        .event-filter-tabs {
            display: flex;
            gap: 0.5rem;
        }
        
        .geo-event-tab,
        .event-filter-tab {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            padding: 0.6rem 1.2rem;
            border: 2px solid var(--geo-border);
            background: var(--geo-bg);
            color: var(--geo-text-light);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .geo-event-tab:hover,
        .event-filter-tab:hover {
            border-color: var(--geo-accent);
            color: var(--geo-accent);
        }
        
        .geo-event-tab.active,
        .event-filter-tab.active {
            background: var(--geo-accent);
            border-color: var(--geo-accent);
            color: white;
        }
        
        /* 排序按钮 - 兼容JS类名 */
        .geo-event-sort__btn,
        .event-sort-btn {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            padding: 0.5rem 1rem;
            border: 2px solid var(--geo-border);
            background: var(--geo-bg);
            color: var(--geo-text-light);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .geo-event-sort__btn:hover,
        .event-sort-btn:hover {
            border-color: var(--geo-primary);
            color: var(--geo-primary);
        }
        
        .geo-event-sort__btn.active,
        .event-sort-btn.active {
            background: var(--geo-primary);
            border-color: var(--geo-primary);
            color: white;
        }
        
        /* 展会网格 - 兼容JS */
        .geo-event-grid,
        #eventGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 展会卡片 - 几何风格 + JS兼容 */
        .geo-event-card,
        .event-card {
            background: var(--geo-bg);
            border: 2px solid var(--geo-border);
            overflow: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .geo-event-card::before,
        .event-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            background: var(--geo-accent);
            clip-path: polygon(0 0, 100% 0, 0 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 5;
        }
        
        .geo-event-card:hover::before,
        .event-card:hover::before {
            opacity: 1;
        }
        
        .geo-event-card:hover,
        .event-card:hover {
            transform: translateY(-5px);
            border-color: var(--geo-primary);
            box-shadow: 8px 8px 0 var(--geo-accent);
        }
        
        .geo-event-card__header,
        .event-card__header {
            padding: 1.2rem 1.5rem;
            background: var(--geo-primary);
            color: white;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .event-card__icon {
            width: 36px;
            height: 36px;
            background: var(--geo-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        
        .event-card__series {
            font-family: 'Outfit', sans-serif;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .geo-event-card__body,
        .event-card__body {
            padding: 1rem 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .geo-event-card__name,
        .event-card__name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
            margin-bottom: 0.3rem;
        }
        
        .event-card__edition {
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            color: var(--geo-text-muted);
            margin-bottom: 0.5rem;
            min-height: 1.2em;
        }
        
        .geo-event-card__count,
        .event-card__stats {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            color: var(--geo-text);
        }
        
        .event-card__stat i {
            color: var(--geo-accent);
        }
        
        .geo-event-card__count i,
        .event-card__stat i {
            color: var(--geo-accent);
        }
        
        .event-card__footer {
            padding: 0.8rem 1.5rem;
            border-top: 2px solid var(--geo-border);
            background: var(--geo-bg-alt);
        }
        
        .event-card__view {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            color: var(--geo-accent);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* 加载状态 */
        #eventLoading,
        .geo-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            gap: 1rem;
        }
        
        .geo-loading__spinner,
        #eventLoading .fa-spinner {
            font-size: 2rem;
            color: var(--geo-accent);
        }
        
        .geo-loading__text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            color: var(--geo-text-muted);
        }
        
        /* 展会模态框 - 兼容JS */
        .geo-event-modal,
        #eventModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 46, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        .geo-event-modal.active,
        #eventModal.active {
            display: flex;
        }
        
        .geo-event-modal__content {
            background: var(--geo-bg);
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            border: 3px solid var(--geo-primary);
            display: flex;
            flex-direction: column;
        }
        
        .geo-event-modal__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background: var(--geo-primary);
            color: white;
        }
        
        .geo-event-modal__title,
        #eventModalTitle {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }
        
        .geo-event-modal__close,
        #eventModalClose {
            width: 36px;
            height: 36px;
            background: var(--geo-accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .geo-event-modal__close:hover,
        #eventModalClose:hover {
            background: white;
            color: var(--geo-accent);
        }
        
        .geo-event-modal__body,
        #eventModalBody {
            padding: 1.5rem;
            overflow-y: auto;
            max-height: calc(90vh - 150px);
        }
        
        /* 模态框加载和空状态 */
        .event-modal__loading,
        .event-modal__empty {
            text-align: center;
            padding: 3rem;
            color: var(--geo-text-muted);
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .event-modal__loading i,
        .event-modal__empty i {
            font-size: 2rem;
            color: var(--geo-accent);
            margin-bottom: 1rem;
            display: block;
        }
        
        /* 专辑列表 */
        .geo-event-modal__albums,
        .event-album-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }
        
        .geo-event-modal__album,
        .event-album-item {
            background: var(--geo-bg-alt);
            border: 2px solid var(--geo-border);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .geo-event-modal__album:hover,
        .event-album-item:hover {
            border-color: var(--geo-accent);
            transform: translateY(-3px);
            box-shadow: 4px 4px 0 var(--geo-accent);
        }
        
        .geo-event-modal__album-cover,
        .event-album-item__cover {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--geo-bg), #e8e8ed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--geo-text-muted);
            overflow: hidden;
        }
        
        .event-album-item__cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .event-album-item:hover .event-album-item__cover img {
            transform: scale(1.1);
        }
        
        .geo-event-modal__album-title,
        .event-album-item__title {
            padding: 0.6rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            color: var(--geo-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* 分页样式 */
        .geo-event-modal__pagination,
        #eventModalPagination {
            display: flex;
            justify-content: center;
            padding: 1rem;
            border-top: 2px solid var(--geo-border);
        }
        
        .event-pagination,
        .event-main-pagination {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .event-pagination__info {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            color: var(--geo-text-muted);
            margin-right: 1rem;
        }
        
        .event-pagination__btn {
            font-family: 'Space Grotesk', sans-serif;
            min-width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--geo-border);
            background: var(--geo-bg);
            color: var(--geo-text);
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0 0.8rem;
            font-size: 0.85rem;
        }
        
        .event-pagination__btn:hover:not(:disabled) {
            border-color: var(--geo-accent);
            color: var(--geo-accent);
        }
        
        .event-pagination__btn.active {
            background: var(--geo-accent);
            border-color: var(--geo-accent);
            color: white;
        }
        
        .event-pagination__btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .event-pagination__ellipsis {
            padding: 0 0.5rem;
            color: var(--geo-text-muted);
        }
        
        /* 主分页容器 */
        #eventPaginationContainer {
            display: flex;
            justify-content: center;
            padding: 1rem 2rem 2rem;
        }
        
        /* 空状态 */
        .geo-event-empty {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--geo-text-muted);
        }
        
        .geo-event-empty__icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .geo-event-empty__text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
        }
        
        @media (max-width: 1200px) {
            .geo-event-grid { grid-template-columns: repeat(3, 1fr); }
        }
        
        @media (max-width: 900px) {
            .geo-event-grid { grid-template-columns: repeat(2, 1fr); }
            .geo-event-title { font-size: 2.5rem; }
            .geo-event-modal__albums { grid-template-columns: repeat(3, 1fr); }
        }
        
        @media (max-width: 600px) {
            .geo-event-grid { grid-template-columns: 1fr; gap: 1rem; padding: 1rem; }
            .geo-event-title { font-size: 2rem; }
            .geo-event-filter__inner { flex-direction: column; align-items: flex-start; }
            .geo-event-modal__albums { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body class="geo-theme">
    <!-- 导航栏 -->
    <nav class="geo-nav">
        <a href="index.html" class="geo-logo">TONGRENLU</a>
        <div class="geo-nav__links">
            <a href="index.html" class="geo-nav__link">首页</a>
            <a href="album.html" class="geo-nav__link">音乐库</a>
            <a href="artist-showcase.html" class="geo-nav__link">艺术家</a>
            <a href="event.html" class="geo-nav__link active">展会</a>
        </div>
        <div class="geo-nav__stats">
            <span class="geo-nav__number" id="eventCount">--</span>
            <span class="geo-nav__label">展会</span>
        </div>
    </nav>
    
    <!-- 展会页面 -->
    <div class="geo-event-page">
        <!-- 搜索头部 -->
        <div class="geo-event-header">
            <h1 class="geo-event-title">展会列表</h1>
            <p class="geo-event-subtitle">东方同人展会收录，包括COMIC MARKET、例大祭、红楼梦等</p>
            <div class="geo-event-search">
                <input type="text" class="geo-event-search__input" id="eventSearchInput" placeholder="搜索展会名称...">
                <i class="fas fa-search geo-event-search__icon"></i>
                <button class="geo-event-search__clear" id="eventSearchClear">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        
        <!-- 筛选区域 -->
        <div class="geo-event-filter">
            <div class="geo-event-filter__inner">
                <div class="geo-event-tabs">
                    <button class="event-filter-tab active" data-filter="all">全部</button>
                    <button class="event-filter-tab" data-filter="comiket">Comic Market</button>
                    <button class="event-filter-tab" data-filter="reitaisai">例大祭</button>
                    <button class="event-filter-tab" data-filter="kouroumu">东方红楼梦</button>
                    <button class="event-filter-tab" data-filter="m3">M3</button>
                    <button class="event-filter-tab" data-filter="other">其他</button>
                </div>
                <div class="geo-event-sort">
                    <span class="geo-event-sort__label">排序:</span>
                    <button class="event-sort-btn active" data-sort="album_count">专辑数量</button>
                    <button class="event-sort-btn" data-sort="name">名称</button>
                </div>
            </div>
        </div>
        
        <!-- 展会网格 -->
        <div class="geo-event-grid" id="eventGrid">
        </div>
        
        <!-- 加载状态 -->
        <div id="eventLoading" style="display: none; text-align: center; padding: 3rem;">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--geo-accent);"></i>
            <p style="font-family: 'Space Grotesk', sans-serif; color: var(--geo-text-muted); margin-top: 1rem;">加载展会...</p>
        </div>
        
        <!-- 空状态 -->
        <div class="geo-event-empty" id="eventEmpty" style="display: none;">
            <i class="fas fa-calendar-times geo-event-empty__icon"></i>
            <p class="geo-event-empty__text">未找到匹配的展会</p>
        </div>
        
        <!-- 分页 -->
        <div id="eventPaginationContainer">
        </div>
    </div>
    
    <!-- 展会详情模态框 -->
    <div class="geo-event-modal" id="eventModal">
        <div class="geo-event-modal__content">
            <div class="geo-event-modal__header">
                <h2 class="geo-event-modal__title" id="eventModalTitle">展会专辑</h2>
                <button class="geo-event-modal__close" id="eventModalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="geo-event-modal__body" id="eventModalBody">
                <!-- 专辑动态加载 -->
            </div>
            <div class="geo-event-modal__pagination" id="eventModalPagination">
                <!-- 分页按钮 -->
            </div>
        </div>
    </div>
    
    <!-- 页脚 -->
    <footer class="geo-footer">
        <div class="geo-footer__logo">TONGRENLU</div>
        <p class="geo-footer__text">&copy; 2025 东方同人录. 本站所有内容版权归原作者所有.</p>
        <p class="geo-footer__text">本网站仅为学习交流使用，不涉及任何商业用途</p>
    </footer>
    
    <!-- 版本号 -->
    <div id="version-info" style="position: fixed; bottom: 10px; right: 10px; background: var(--geo-primary); color: white; padding: 5px 10px; font-family: 'Space Grotesk', sans-serif; font-size: 11px; z-index: 1002; clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);">
        v2.0 GEOMETRIC
    </div>

    <!-- JavaScript -->
    <script src="webjars/jquery/jquery.min.js"></script>
    <script src="components/shared/image-loader.js"></script>
    <script src="components/event-list/event-list.js"></script>
</body>
</html>
