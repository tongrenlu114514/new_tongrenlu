<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐库 - 东方同人录</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="assets/css/geometric-theme.css" rel="stylesheet">
    
    <style>
        /* 音乐库页面特定样式 */
        .geo-music-page {
            padding-top: 80px;
            min-height: 100vh;
        }
        
        .geo-music-header {
            background: var(--geo-primary);
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .geo-music-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(45deg, transparent 49%, rgba(233, 69, 96, 0.1) 49%, rgba(233, 69, 96, 0.1) 51%, transparent 51%);
            background-size: 40px 40px;
        }
        
        .geo-music-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            color: white;
            letter-spacing: 5px;
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        /* 搜索框样式 */
        .geo-search {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
        }
        
        .geo-search__input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            padding-right: 60px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            border: none;
            background: white;
            color: var(--geo-text);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }
        
        .geo-search__btn {
            position: absolute;
            right: 5px;
            top: 5px;
            bottom: 5px;
            width: 50px;
            background: var(--geo-accent);
            border: none;
            color: white;
            cursor: pointer;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.3s ease;
        }
        
        .geo-search__btn:hover {
            background: var(--geo-primary);
        }
        
        /* 搜索建议 */
        .geo-suggestions {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid var(--geo-border);
            border-top: none;
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
        }
        
        .geo-suggestions.active {
            display: block;
        }
        
        .geo-suggestions__item,
        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 1px solid var(--geo-border);
        }
        
        .geo-suggestions__item:hover,
        .suggestion-item:hover,
        .suggestion-item.highlighted {
            background: var(--geo-bg-alt);
        }
        
        .geo-suggestions__icon,
        .suggestion-icon {
            width: 40px;
            height: 40px;
            background: var(--geo-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            flex-shrink: 0;
        }
        
        .geo-suggestions__info,
        .suggestion-content {
            flex: 1;
            min-width: 0;
        }
        
        .geo-suggestions__title,
        .suggestion-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            color: var(--geo-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .geo-suggestions__artist,
        .suggestion-artist {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            color: var(--geo-text-muted);
        }
        
        .suggestions-header {
            padding: 0.5rem 1rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7rem;
            color: var(--geo-text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--geo-bg-alt);
            border-bottom: 1px solid var(--geo-border);
        }
        
        .history-item {
            position: relative;
        }
        
        .history-delete {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            color: var(--geo-text-muted);
            cursor: pointer;
            padding: 0.3rem;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .history-item:hover .history-delete {
            opacity: 1;
        }
        
        .history-delete:hover {
            color: var(--geo-accent);
        }
        
        /* 筛选区域 */
        .geo-filter-section {
            background: var(--geo-bg-alt);
            padding: 1.5rem 2rem;
            border-bottom: 3px solid var(--geo-border);
        }
        
        .geo-filter-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .geo-tags,
        #filterTags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .geo-tag,
        .tag {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            padding: 0.6rem 1.2rem;
            border: 2px solid var(--geo-border);
            background: var(--geo-bg);
            color: var(--geo-text-light);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        
        .geo-tag:hover,
        .tag:hover {
            border-color: var(--geo-accent);
            color: var(--geo-accent);
        }
        
        .geo-tag.active,
        .tag.active {
            background: var(--geo-accent);
            border-color: var(--geo-accent);
            color: white;
        }
        
        .geo-sort {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        
        .geo-sort__label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            color: var(--geo-text-muted);
            text-transform: uppercase;
        }
        
        .geo-sort__select {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            padding: 0.6rem 1rem;
            border: 2px solid var(--geo-border);
            background: var(--geo-bg);
            color: var(--geo-text);
            cursor: pointer;
        }
        
        /* 音乐网格 - 保持与JS组件兼容的类名 */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 音乐卡片几何风格 */
        .music-card {
            position: relative;
            background: var(--geo-bg);
            border: 2px solid var(--geo-border);
            overflow: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
        }
        
        .music-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            background: var(--geo-accent);
            clip-path: polygon(0 0, 100% 0, 0 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 5;
        }
        
        .music-card:hover::before {
            opacity: 1;
        }
        
        .music-card:hover {
            transform: translateY(-5px);
            border-color: var(--geo-primary);
            box-shadow: 8px 8px 0 var(--geo-accent);
        }
        
        .music-card .album-cover {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--geo-bg-alt), #e8e8ed);
            position: relative;
            overflow: hidden;
        }
        
        .music-card .fallback-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            color: var(--geo-text-muted);
            opacity: 0.3;
        }
        
        .music-card .card-content {
            padding: 1rem;
            border-top: 2px solid var(--geo-border);
        }
        
        .music-card .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--geo-primary);
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .music-card .card-stats {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            color: var(--geo-text-light);
        }
        
        .music-card .card-stats i {
            color: var(--geo-accent);
        }
        
        .music-card .play-button {
            position: absolute;
            bottom: 70px;
            right: 10px;
            width: 38px;
            height: 38px;
            background: var(--geo-accent);
            border: none;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .music-card:hover .play-button {
            opacity: 1;
            transform: scale(1);
        }
        
        .music-card .play-button:hover {
            background: var(--geo-primary);
        }
        
        .music-card .album-description-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(26, 26, 46, 0.9));
            padding: 2rem 1rem 1rem;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        
        .music-card:hover .album-description-overlay {
            transform: translateY(0);
        }
        
        .music-card .album-description-text {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.8);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* 骨架屏样式 */
        .skeleton-card {
            pointer-events: none;
        }
        
        .skeleton-card .skeleton-cover {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(90deg, var(--geo-bg-alt) 25%, #f0f0f0 50%, var(--geo-bg-alt) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }
        
        .skeleton-card .card-content {
            padding: 1rem;
        }
        
        .skeleton-card .skeleton-title {
            height: 14px;
            background: var(--geo-bg-alt);
            margin-bottom: 0.5rem;
            border-radius: 2px;
        }
        
        .skeleton-card .skeleton-stats {
            height: 10px;
            width: 50%;
            background: var(--geo-bg-alt);
            border-radius: 2px;
        }
        
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .no-results, .error {
            grid-column: 1/-1;
            text-align: center;
            padding: 3rem;
            font-family: 'Space Grotesk', sans-serif;
            color: var(--geo-text-muted);
        }
        
        /* 模态框内元素样式 */
        .album-art {
            width: 150px;
            height: 150px;
            background: var(--geo-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            overflow: hidden;
        }
        
        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .album-art .fallback-content {
            font-size: 3rem;
            color: white;
            opacity: 0.5;
        }
        
        .album-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: white;
            margin-bottom: 0.5rem;
        }
        
        .album-artist {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 1rem;
        }
        
        .album-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        
        .meta-item {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .album-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        
        .report-error-btn {
            width: 36px;
            height: 36px;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .report-error-btn:hover {
            border-color: var(--geo-accent);
            color: var(--geo-accent);
        }
        
        .album-description {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            color: var(--geo-text-light);
            line-height: 1.7;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--geo-border);
        }
        
        .track-list h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            color: var(--geo-primary);
            letter-spacing: 2px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .tracks {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .track {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid var(--geo-border);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .track:hover {
            background: var(--geo-bg-alt);
        }
        
        .track-play-btn {
            width: 28px;
            height: 28px;
            background: var(--geo-accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            margin-right: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .track-play-btn:hover {
            background: var(--geo-primary);
        }
        
        .track-number {
            font-family: 'Bebas Neue', sans-serif;
            width: 30px;
            color: var(--geo-text-muted);
        }
        
        .track-title {
            flex: 1;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            color: var(--geo-text);
        }
        
        .track-duration {
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            color: var(--geo-text-muted);
        }
        
        /* 分页跳转 */
        .geo-pagination__jump {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .geo-pagination__jump-input {
            width: 50px;
            padding: 0.5rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            border: 2px solid var(--geo-border);
            background: var(--geo-bg);
            color: var(--geo-text);
            text-align: center;
        }
        
        .geo-pagination__jump-btn {
            font-family: 'Space Grotesk', sans-serif;
            padding: 0.5rem 1rem;
            border: 2px solid var(--geo-accent);
            background: var(--geo-accent);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        
        .geo-pagination__jump-btn:hover {
            background: var(--geo-primary);
            border-color: var(--geo-primary);
        }
        
        @media (max-width: 1200px) {
            .geo-music-grid { grid-template-columns: repeat(4, 1fr); }
        }
        
        @media (max-width: 900px) {
            .geo-music-grid { grid-template-columns: repeat(3, 1fr); }
            .geo-music-title { font-size: 2.5rem; }
        }
        
        @media (max-width: 600px) {
            .geo-music-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; padding: 1rem; }
            .geo-filter-inner { flex-direction: column; align-items: flex-start; }
            .geo-music-title { font-size: 2rem; }
        }
    </style>
</head>
<body class="geo-theme">
    <!-- 导航栏 -->
    <nav class="geo-nav">
        <a href="index.html" class="geo-logo">TONGRENLU</a>
        <div class="geo-nav__links">
            <a href="index.html" class="geo-nav__link">首页</a>
            <a href="album.html" class="geo-nav__link active">音乐库</a>
            <a href="artist-showcase.html" class="geo-nav__link">艺术家</a>
            <a href="event.html" class="geo-nav__link">展会</a>
        </div>
        <div class="geo-nav__stats">
            <span class="geo-nav__number" id="navAlbumCount">--</span>
            <span class="geo-nav__label">专辑</span>
        </div>
    </nav>
    
    <!-- 音乐库页面 -->
    <div class="geo-music-page">
        <!-- 搜索头部 -->
        <div class="geo-music-header">
            <h1 class="geo-music-title">音乐库</h1>
            <div class="geo-search">
                <input type="text" class="geo-search__input" id="searchInput" placeholder="搜索音乐、艺术家、专辑..." autocomplete="off">
                <button class="geo-search__btn"><i class="fas fa-search"></i></button>
                <div class="geo-suggestions" id="searchSuggestions">
                    <div id="suggestionsList"></div>
                </div>
            </div>
        </div>
        
        <!-- 筛选区域 -->
        <div class="geo-filter-section">
            <div class="geo-filter-inner">
                <div class="geo-tags" id="filterTags">
                    <div class="geo-tag active" data-tag="">全部</div>
                </div>
                <div class="geo-sort">
                    <span class="geo-sort__label">排序:</span>
                    <select class="geo-sort__select" id="sortSelect">
                        <option value="publishDate">最新发布</option>
                        <option value="accessCount">最多播放</option>
                        <option value="title">标题排序</option>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- 音乐网格 -->
        <div class="music-grid" id="musicGrid">
        </div>
        
        <!-- 分页 -->
        <div class="geo-pagination">
            <div class="geo-pagination__info">
                <span id="paginationInfo">第 1 页 / 共 1 页</span>
            </div>
            <div class="geo-pagination__controls" id="paginationControls">
            </div>
            <div class="geo-pagination__jump">
                <span>跳转到</span>
                <input type="number" class="geo-pagination__jump-input" id="jumpInput" min="1" value="1">
                <span>页</span>
                <button class="geo-pagination__jump-btn" id="jumpBtn">GO</button>
            </div>
        </div>
    </div>
    
    <!-- 专辑详情模态框 -->
    <div class="geo-modal" id="albumModal">
        <div class="geo-modal__content">
            <button class="geo-modal__close" onclick="closeAlbumModal()"><i class="fas fa-times"></i></button>
            <div class="geo-modal__header">
                <div class="album-art geo-modal__cover">
                    <div class="fallback-content">🎵</div>
                </div>
                <div class="geo-modal__info">
                    <h2 class="album-title">专辑标题</h2>
                    <p class="album-artist">艺术家</p>
                    <div class="album-meta">
                        <span class="meta-item"><i class="far fa-calendar"></i> 未知</span>
                        <span class="meta-item"><i class="fas fa-music"></i> 未知</span>
                        <span class="meta-item"><i class="fas fa-headphones"></i> <span class="access-count">0</span> 次播放</span>
                    </div>
                    <div class="album-actions">
                        <button class="play-all-btn geo-btn geo-btn--primary"><i class="fas fa-play"></i> 播放全部</button>
                        <button class="report-error-btn" data-album-id="" title="报告错误">
                            <i class="fas fa-flag"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="geo-modal__body">
                <p class="album-description">暂无专辑描述</p>
                <div class="track-list">
                    <h3><i class="fas fa-list"></i> 曲目列表</h3>
                    <ul class="tracks">
                        <!-- 动态加载曲目 -->
                    </ul>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 页脚 -->
    <footer class="geo-footer">
        <div class="geo-footer__logo">TONGRENLU</div>
        <p class="geo-footer__text">&copy; 2025 东方同人录. 本站所有内容版权归原作者所有.</p>
        <p class="geo-footer__text">本网站仅为学习交流使用，不涉及任何商业用途</p>
    </footer>
    
    <!-- 版本号 -->
    <div id="version-info" style="position: fixed; bottom: 10px; right: 10px; background: var(--geo-primary); color: white; padding: 5px 10px; font-family: 'Space Grotesk', sans-serif; font-size: 11px; z-index: 1002; clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);">
        v2.0 GEOMETRIC
    </div>

    <!-- JavaScript -->
    <script src="webjars/jquery/jquery.min.js"></script>
    <script src="components/shared/image-loader.js"></script>
    <script src="components/music-library/music-library.js"></script>
</body>
</html>
